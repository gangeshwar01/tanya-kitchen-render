<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Plate/Bowl -->
  <ellipse cx="50" cy="60" rx="25" ry="8" fill="#fff" opacity="0.9"/>
  <ellipse cx="50" cy="58" rx="22" ry="6" fill="#fff" opacity="0.7"/>
  
  <!-- Utensils (Fork and Spoon) -->
  <!-- Fork -->
  <rect x="35" y="45" width="3" height="15" fill="#fff" rx="1"/>
  <rect x="37" y="45" width="1" height="8" fill="#fff"/>
  <rect x="39" y="45" width="1" height="8" fill="#fff"/>
  <rect x="41" y="45" width="1" height="8" fill="#fff"/>
  
  <!-- Spoon -->
  <rect x="62" y="45" width="3" height="12" fill="#fff" rx="1"/>
  <ellipse cx="63.5" cy="58" rx="2" ry="3" fill="#fff"/>
  
  <!-- Steam/Heat lines -->
  <line x1="50" y1="30" x2="50" y2="20" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="45" y1="32" x2="43" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="55" y1="32" x2="57" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>

